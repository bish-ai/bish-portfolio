kind = "web"
previewPath = "/"
title = "Bishal Mondal - AI Engineer Portfolio"
version = "1.0.0"
id = "artifacts/bishal-portfolio"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19015

[services.development]
run = "pnpm --filter @workspace/bishal-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bishal-portfolio", "run", "build" ]
serve = "static"
publicDir = "artifacts/bishal-portfolio/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19015"
BASE_PATH = "/"
